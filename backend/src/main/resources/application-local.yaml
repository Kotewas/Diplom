spring:
  datasource:
    url: jdbc:h2:file:./.local-db/diplom;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  # local profile keeps weather endpoints functional via WeatherService fallback
  # (OpenWeatherMap API -> synthetic model)
  weather:
    ttl-ms: ${WEATHER_TTL_MS:600000}
