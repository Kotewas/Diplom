server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:diplom_bd}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:147855}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  weather:
    base-url: ${WEATHER_BASE_URL:https://api.openweathermap.org/data/2.5/weather}
    api-key: ${WEATHER_API_KEY:9b4cc0948dcc520972385870ae821c24}
    ttl-ms: ${WEATHER_TTL_MS:600000}
  risk-refresh:
    tick-ms: ${RISK_REFRESH_TICK_MS:3600000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
